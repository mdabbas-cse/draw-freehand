<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Draw Freehand</title>
  <link rel='stylesheet' href='./app.min.css' />
  <script src="./dist/draw-freehand.min.js" defer></script>
  <script src="./app.main.js" defer></script>
</head>

<body>
  <nav class="navbar">
    <button type="button" class="hamburger" id="toggle-sidebar" aria-label="Toggle sidebar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24">
        <path fill="currentColor" d="M3 18v-2h18v2H3Zm0-5v-2h18v2H3Zm0-5V6h18v2H3Z" />
      </svg>
    </button>
    <h1 class="nav-title">Draw Freehand</h1>
    <a href="https://github.com/mdabbas-cse/draw-freehand" target="_blank" rel="noreferrer noopener"
      aria-label="GitHub" class="github-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24">
        <path fill="currentColor"
          d="M12.001 2c-5.525 0-10 4.475-10 10a9.994 9.994 0 0 0 6.837 9.488c.5.087.688-.213.688-.476c0-.237-.013-1.024-.013-1.862c-2.512.463-3.162-.612-3.362-1.175c-.113-.288-.6-1.175-1.025-1.413c-.35-.187-.85-.65-.013-.662c.788-.013 1.35.725 1.538 1.025c.9 1.512 2.337 1.087 2.912.825c.088-.65.35-1.087.638-1.337c-2.225-.25-4.55-1.113-4.55-4.938c0-1.088.387-1.987 1.025-2.688c-.1-.25-.45-1.275.1-2.65c0 0 .837-.262 2.75 1.026a9.28 9.28 0 0 1 2.5-.338c.85 0 1.7.112 2.5.337c1.913-1.3 2.75-1.024 2.75-1.024c.55 1.375.2 2.4.1 2.65c.637.7 1.025 1.587 1.025 2.687c0 3.838-2.337 4.688-4.563 4.938c.363.312.676.912.676 1.85c0 1.337-.013 2.412-.013 2.75c0 .262.188.574.688.474A10.016 10.016 0 0 0 22 12c0-5.525-4.475-10-10-10Z" />
      </svg>
    </a>
  </nav>

  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-content">

        <div class="settings-group">
          <div class="setting-row">
            <label for="size">Size</label>
            <input type="range" id="size" min="1" max="100" value="16">
            <span class="val" id="size-val">16</span>
          </div>
          <div class="setting-row">
            <label for="thinning">Thinning</label>
            <input type="range" id="thinning" min="-100" max="100" value="50">
            <span class="val" id="thinning-val">0.5</span>
          </div>
          <div class="setting-row">
            <label for="streamline">Streamline</label>
            <input type="range" id="streamline" min="0" max="100" value="50">
            <span class="val" id="streamline-val">0.5</span>
          </div>
          <div class="setting-row">
            <label for="smoothing">Smoothing</label>
            <input type="range" id="smoothing" min="0" max="100" value="50">
            <span class="val" id="smoothing-val">0.5</span>
          </div>
          <div class="setting-row">
            <label for="easing">Easing</label>
            <select id="easing">
              <option value="linear">Linear</option>
              <option value="easeInQuad">EaseInQuad</option>
              <option value="easeOutQuad">EaseOutQuad</option>
              <option value="easeInOutQuad">EaseInOutQuad</option>
              <option value="easeInCubic">EaseInCubic</option>
              <option value="easeOutCubic">EaseOutCubic</option>
            </select>
          </div>
        </div>

        <div class="divider"></div>

        <div class="settings-group">
          <div class="setting-row">
            <label for="taper-start">Taper Start</label>
            <input type="range" id="taper-start" min="0" max="200" value="38">
            <span class="val" id="taper-start-val">38</span>
          </div>
          <div class="setting-row">
            <label for="easing-start">Easing Start</label>
            <select id="easing-start">
              <option value="easeOutQuad">EaseOutQuad</option>
              <option value="linear">Linear</option>
              <option value="easeInQuad">EaseInQuad</option>
              <option value="easeInOutQuad">EaseInOutQuad</option>
              <option value="easeInCubic">EaseInCubic</option>
              <option value="easeOutCubic">EaseOutCubic</option>
            </select>
          </div>
        </div>

        <div class="divider"></div>

        <div class="settings-group">
          <div class="setting-row">
            <label for="taper-end">Taper End</label>
            <input type="range" id="taper-end" min="0" max="200" value="0">
            <span class="val" id="taper-end-val">0</span>
          </div>
          <div class="setting-row">
            <label for="cap-end">Cap End</label>
            <input type="checkbox" id="cap-end" checked>
          </div>
        </div>

        <div class="divider"></div>

        <div class="settings-group">
          <div class="setting-row">
            <label for="pen-color">Fill</label>
            <input type="color" id="pen-color" value="#000000">
          </div>
          <div class="color-palette">
            <button type="button" class="swatch swatch-black active" data-color="#000000" aria-label="black"></button>
            <button type="button" class="swatch swatch-yellow" data-color="#f59e0b" aria-label="yellow"></button>
            <button type="button" class="swatch swatch-orange" data-color="#f97316" aria-label="orange"></button>
            <button type="button" class="swatch swatch-red" data-color="#ef4444" aria-label="red"></button>
            <button type="button" class="swatch swatch-pink" data-color="#ec4899" aria-label="pink"></button>
            <button type="button" class="swatch swatch-purple" data-color="#8b5cf6" aria-label="purple"></button>
            <button type="button" class="swatch swatch-cyan" data-color="#06b6d4" aria-label="cyan"></button>
            <button type="button" class="swatch swatch-gray" data-color="#e5e7eb" aria-label="light gray"></button>
          </div>
          <div class="setting-row">
            <label for="bg-color">Background</label>
            <input type="color" id="bg-color" value="#ffffff">
          </div>
        </div>

        <div class="divider"></div>

        <div class="sidebar-actions">
          <button type="button" id="reset-options">Reset Options</button>
          <button type="button" id="copy-options">Copy Options</button>
        </div>

        <div class="divider"></div>

        <div class="sidebar-actions">
          <button type="button" id="copy-svg" class="full-btn">Copy to SVG</button>
        </div>

      </div>
    </aside>

    <main class="canvas-area">
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <footer class="bottom-bar">
    <div class="bottom-left">
      <button type="button" class="mode-btn active" id="draw-mode">Draw</button>
    </div>
    <div class="bottom-right">
      <button type="button" id="undo">Undo</button>
      <button type="button" id="redo">Redo</button>
      <button type="button" id="clear">Clear</button>
    </div>
  </footer>
</body>

</html>
